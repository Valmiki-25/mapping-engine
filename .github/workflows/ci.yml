name: CI Pipeline - AI Learning Advisor

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  lint:
    name: Step 1 - Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 app.py embeddings.py scraper.py \
            --max-line-length=100 \
            --ignore=E501,W503,E225,E226,E231,E722,W292,F401,E303

  test:
    name: Step 2 - Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pandas numpy pytest scikit-learn

      - name: Run pytest
        run: pytest tests/ -v

  docker:
    name: Step 3 - Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t ai-learning-advisor:latest .